app = "quizblast-backend"
primary_region = "jnb"          # Johannesburg — closest to Kigali
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "node dist/prisma-migrate.js"

[env]
  NODE_ENV = "production"
  PORT     = "4000"

[http_service]
  internal_port       = 4000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
